  <text x="640" y="300" text-anchor="middle" font-family="Inter, SF Pro Display, Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="96" font-weight="800" fill="url(#grad)" letter-spacing="6" filter="url(#textglow)">SLIPSTREAM</text>
  <text x="640" y="350" text-anchor="middle" font-family="JetBrains Mono, SF Mono, Fira Code, monospace" font-size="24" fill="#7f849c" letter-spacing="8">SSH WRAPPER FOR RED TEAMS</text>
  <text x="640" y="390" text-anchor="middle" font-family="JetBrains Mono, SF Mono, Fira Code, monospace" font-size="16" fill="#585b70" letter-spacing="4">RUST  ·  PTY  ·  TUNNELS  ·  LOGGING</text>
