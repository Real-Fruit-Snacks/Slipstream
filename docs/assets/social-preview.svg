<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#74c7ec"/>
      <stop offset="50%" stop-color="#89b4fa"/>
      <stop offset="100%" stop-color="#b4befe"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="43%" r="35%">
      <stop offset="0%" stop-color="#74c7ec" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#89b4fa" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#b4befe" stop-opacity="0"/>
    </radialGradient>
    <filter id="textglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="1280" height="640" fill="#11111b"/>
