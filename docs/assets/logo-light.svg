<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: deep blue to indigo -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="40%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Accent gradient: emerald to blue -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>

    <!-- Icon gradient: vertical for the mark -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#0284c7" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#0284c7" opacity="0.04"/>

    <!-- Flow stream 1: top-left to bottom-right (forward data — SSH out) -->
    <path d="M 36 42 C 52 32, 65 58, 80 48 C 95 38, 108 62, 124 52"
          stroke="url(#g2)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>

    <!-- Flow stream 2: bottom-left to top-right (return data — SSH back) -->
    <path d="M 36 88 C 52 98, 65 72, 80 82 C 95 92, 108 68, 124 78"
          stroke="url(#g1)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.85"/>

    <!-- Center crossing point — bright node -->
    <circle cx="80" cy="65" r="5" fill="url(#g3)" opacity="0.9"/>
    <circle cx="80" cy="65" r="2.5" fill="#ffffff"/>
    <circle cx="80" cy="65" r="8" fill="none" stroke="#0284c7" stroke-width="0.5" opacity="0.25"/>

    <!-- Entry/exit nodes — small, clean -->
    <circle cx="36" cy="42" r="3" fill="#0d9488" opacity="0.7"/>
    <circle cx="124" cy="52" r="3" fill="#0284c7" opacity="0.7"/>
    <circle cx="36" cy="88" r="3" fill="#2563eb" opacity="0.7"/>
    <circle cx="124" cy="78" r="3" fill="#6366f1" opacity="0.7"/>

    <!-- Subtle flow particles — static dots along the paths -->
    <circle cx="50" cy="37" r="1.5" fill="#0d9488" opacity="0.45"/>
    <circle cx="65" cy="50" r="1.2" fill="#0284c7" opacity="0.35"/>
    <circle cx="95" cy="42" r="1.5" fill="#2563eb" opacity="0.45"/>
    <circle cx="112" cy="55" r="1.2" fill="#0284c7" opacity="0.35"/>

    <circle cx="50" cy="93" r="1.5" fill="#2563eb" opacity="0.45"/>
    <circle cx="65" cy="78" r="1.2" fill="#0284c7" opacity="0.35"/>
    <circle cx="95" cy="86" r="1.5" fill="#6366f1" opacity="0.45"/>
    <circle cx="112" cy="72" r="1.2" fill="#2563eb" opacity="0.35"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#06b6d4" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#2563eb" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "SLIPSTREAM" — clean, bold, wide-tracked -->
  <text x="430" y="100"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="62" font-weight="800" letter-spacing="10"
        fill="url(#g1)" text-anchor="middle">SLIPSTREAM</text>

  <!-- Thin separator line -->
  <line x1="270" y1="118" x2="590" y2="118"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline — refined, subtle -->
  <text x="430" y="142"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">SSH WRAPPER FOR RED TEAMS</text>

  <!-- Descriptor — very subtle -->
  <text x="430" y="162"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">RUST  ·  PTY  ·  TUNNELS  ·  LOGGING</text>
</svg>
