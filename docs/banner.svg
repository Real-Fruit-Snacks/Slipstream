<svg xmlns="http://www.w3.org/2000/svg" width="800" height="290" viewBox="0 0 800 290">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#74c7ec"/>
      <stop offset="35%" style="stop-color:#89b4fa"/>
      <stop offset="65%" style="stop-color:#b4befe"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#74c7ec;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#74c7ec"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="80%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="290" rx="12" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="800" height="290" rx="12" fill="none" stroke="#45475a" stroke-width="1"/>

  <!-- Decorative flow lines (top) — representing data streams -->
  <g opacity="0.06">
    <path d="M50,0 Q200,30 350,0" fill="none" stroke="#74c7ec" stroke-width="1.5"/>
    <path d="M150,0 Q300,25 450,0" fill="none" stroke="#89b4fa" stroke-width="1"/>
    <path d="M350,0 Q500,35 650,0" fill="none" stroke="#b4befe" stroke-width="1.5"/>
    <path d="M450,0 Q600,20 750,0" fill="none" stroke="#cba6f7" stroke-width="1"/>
  </g>

  <!-- Decorative flow lines (bottom) — representing SSH tunnels -->
  <g opacity="0.05">
    <path d="M50,290 Q200,260 350,290" fill="none" stroke="#74c7ec" stroke-width="1.5"/>
    <path d="M200,290 Q350,265 500,290" fill="none" stroke="#89b4fa" stroke-width="1"/>
    <path d="M400,290 Q550,255 700,290" fill="none" stroke="#b4befe" stroke-width="1.5"/>
    <path d="M500,290 Q650,270 800,290" fill="none" stroke="#cba6f7" stroke-width="1"/>
  </g>

  <!-- Decorative dots pattern — left cluster -->
  <g opacity="0.08">
    <circle cx="55" cy="42" r="1.5" fill="#74c7ec"/>
    <circle cx="75" cy="37" r="1" fill="#89b4fa"/>
    <circle cx="95" cy="47" r="1.5" fill="#b4befe"/>
    <circle cx="70" cy="57" r="1" fill="#cba6f7"/>
    <circle cx="90" cy="30" r="1" fill="#74c7ec"/>
    <circle cx="110" cy="40" r="1.5" fill="#89b4fa"/>
    <circle cx="35" cy="50" r="1" fill="#b4befe"/>
    <circle cx="115" cy="54" r="1" fill="#74c7ec"/>
    <circle cx="45" cy="32" r="1.5" fill="#89b4fa"/>
    <circle cx="125" cy="34" r="1" fill="#cba6f7"/>
  </g>

  <!-- Decorative dots pattern — right cluster -->
  <g opacity="0.08">
    <circle cx="705" cy="212" r="1.5" fill="#89b4fa"/>
    <circle cx="685" cy="222" r="1" fill="#74c7ec"/>
    <circle cx="725" cy="227" r="1.5" fill="#b4befe"/>
    <circle cx="700" cy="237" r="1" fill="#cba6f7"/>
    <circle cx="670" cy="217" r="1" fill="#89b4fa"/>
    <circle cx="735" cy="217" r="1" fill="#74c7ec"/>
    <circle cx="745" cy="232" r="1.5" fill="#cba6f7"/>
    <circle cx="660" cy="230" r="1" fill="#b4befe"/>
  </g>

  <!-- SSH arrow decoration — left side -->
  <g opacity="0.07" transform="translate(30, 130)">
    <path d="M0,0 L25,0 L20,-5 M25,0 L20,5" fill="none" stroke="#74c7ec" stroke-width="1.5"/>
    <path d="M5,12 L30,12 L25,7 M30,12 L25,17" fill="none" stroke="#89b4fa" stroke-width="1"/>
  </g>

  <!-- SSH arrow decoration — right side -->
  <g opacity="0.07" transform="translate(740, 130)">
    <path d="M30,0 L5,0 L10,-5 M5,0 L10,5" fill="none" stroke="#cba6f7" stroke-width="1.5"/>
    <path d="M25,12 L0,12 L5,7 M0,12 L5,17" fill="none" stroke="#b4befe" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="400" y="125" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="68" font-weight="bold" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="16" filter="url(#glow)">SLIPSTREAM</text>

  <!-- Accent line under title -->
  <rect x="160" y="143" width="480" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="400" y="175" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="13" fill="#a6adc8" text-anchor="middle"
        letter-spacing="4">RED TEAM SSH WRAPPER</text>

  <!-- Feature badges — row 1 (centered: 4 badges, 595px total, offset 102) -->
  <g transform="translate(102, 200)">
    <rect x="0" y="0" width="130" height="28" rx="14" fill="#313244"/>
    <rect x="0" y="0" width="130" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="18" cy="14" r="4" fill="#a6e3a1"/>
    <text x="30" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">pty wrapper</text>

    <rect x="145" y="0" width="130" height="28" rx="14" fill="#313244"/>
    <rect x="145" y="0" width="130" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="163" cy="14" r="4" fill="#89b4fa"/>
    <text x="175" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">ssh tunnels</text>

    <rect x="290" y="0" width="130" height="28" rx="14" fill="#313244"/>
    <rect x="290" y="0" width="130" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="308" cy="14" r="4" fill="#f38ba8"/>
    <text x="320" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">file xfer</text>

    <rect x="435" y="0" width="160" height="28" rx="14" fill="#313244"/>
    <rect x="435" y="0" width="160" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="453" cy="14" r="4" fill="#fab387"/>
    <text x="465" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">session logging</text>
  </g>

  <!-- Feature badges — row 2 (centered: 3 badges, 500px total, offset 150) -->
  <g transform="translate(150, 235)">
    <rect x="0" y="0" width="150" height="28" rx="14" fill="#313244"/>
    <rect x="0" y="0" width="150" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="18" cy="14" r="4" fill="#74c7ec"/>
    <text x="30" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">fs mapper</text>

    <rect x="165" y="0" width="140" height="28" rx="14" fill="#313244"/>
    <rect x="165" y="0" width="140" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="183" cy="14" r="4" fill="#cba6f7"/>
    <text x="195" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">auto recon</text>

    <rect x="320" y="0" width="180" height="28" rx="14" fill="#313244"/>
    <rect x="320" y="0" width="180" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="338" cy="14" r="4" fill="#94e2d5"/>
    <text x="350" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">linux + windows</text>
  </g>
</svg>
