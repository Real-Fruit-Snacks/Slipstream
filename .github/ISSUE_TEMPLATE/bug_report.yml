name: Bug Report
description: Report a bug in Slipstream
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: input
    id: version
    attributes:
      label: Slipstream Version
      description: "Git commit hash or release tag"
      placeholder: "0.1.0 or commit abc1234"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Platform
      description: "Operating system and architecture of the machine running Slipstream"
      placeholder: "Ubuntu 24.04 x86_64 / macOS 15 ARM64"
    validations:
      required: true

  - type: input
    id: target-os
    attributes:
      label: Target OS
      description: "Operating system of the SSH target (if applicable)"
      placeholder: "Ubuntu 22.04 / Windows Server 2022 / N/A"
    validations:
      required: false

  - type: input
    id: ssh-version
    attributes:
      label: OpenSSH Version
      description: "Output of `ssh -V`"
      placeholder: "OpenSSH_9.6p1"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Provide the exact steps to reproduce the bug"
      placeholder: |
        1. Run `slipstream ssh user@target`
        2. Type `!tunnel add --type socks -p 1080`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: "Paste any relevant logs, error messages, or terminal output"
      render: shell
    validations:
      required: false
